<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Reverse Car Market is a buyer-first car marketplace. Post the car you want and let sellers come to you."
    />
    <title>Reverse Car Market</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isGitHubPages = window.location.hostname.endsWith('github.io');

      if (isGitHubPages) {
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = '/Reverse-Car-Market/assets/app.css';
        document.head.appendChild(stylesheet);

        const appScript = '/Reverse-Car-Market/assets/app.js';
        import(/* @vite-ignore */ appScript);
      } else {
        import('/src/main.tsx');
      }
    </script>
  </body>
</html>
